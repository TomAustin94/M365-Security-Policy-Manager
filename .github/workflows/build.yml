name: Build & Release

on:
  push:
    branches: [main]
    tags-ignore: ['**']  # tags are internal; never re-trigger from them

jobs:
  # ── 1. Bump version, tag, create draft release ─────────────────────────────
  prepare-release:
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          npm version "$NEW_VERSION" --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main
          git push origin "v${NEW_VERSION}"

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes \
            --draft \
            --repo "${{ github.repository }}"

  # ── 2. Build on all platforms ───────────────────────────────────────────────
  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install PowerShell (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Build Vite renderer
        run: npm run build:renderer

      - name: Build Electron (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (Linux)
        if: runner.os == 'Linux'
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist-electron/*.deb
            dist-electron/*.AppImage

  # ── 3a. Both builds passed → attach artifacts and publish ──────────────────
  publish-release:
    needs: [prepare-release, build]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload artifacts and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.prepare-release.outputs.version }}" \
            windows-installer/*.exe \
            linux-packages/*.deb \
            linux-packages/*.AppImage \
            --repo "${{ github.repository }}"

          gh release edit "v${{ needs.prepare-release.outputs.version }}" \
            --draft=false \
            --repo "${{ github.repository }}"

  # ── 3b. Any build failed → delete the draft release ────────────────────────
  cleanup-release:
    needs: [prepare-release, build]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Delete draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ needs.prepare-release.outputs.version }}" \
            --yes \
            --repo "${{ github.repository }}"
          echo "Draft release v${{ needs.prepare-release.outputs.version }} deleted due to build failure."
