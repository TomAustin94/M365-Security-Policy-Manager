appId: com.yourcompany.m365policymanager
productName: M365 Security Policy Manager
copyright: Copyright © 2025

directories:
  output: dist
  buildResources: build

files:
  - dist-renderer/**/*
  - src/main/**/*
  - src/preload/**/*
  - src/shared/**/*
  - scripts/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: scripts/install-powershell.sh
    to: scripts/install-powershell.sh

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

linux:
  target:
    - target: deb
      arch: [x64]
  icon: build/icon.png
  category: Utility

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0

mac:
  target: dmg
  icon: build/icon.icns
