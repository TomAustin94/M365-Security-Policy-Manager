appId: com.yourcompany.m365policymanager
productName: M365 Security Policy Manager
copyright: Copyright © 2025

directories:
  output: dist
  buildResources: build

files:
  - dist-renderer/**/*
  - src/main/**/*
  - src/preload/**/*
  - src/shared/**/*
  - scripts/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: scripts/install-powershell.sh
    to: scripts/install-powershell.sh

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png
  category: Utility

mac:
  target: dmg
  icon: build/icon.icns
